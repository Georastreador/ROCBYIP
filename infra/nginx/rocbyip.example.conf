# ROCBYIP — exemplo nginx (TLS + reverse proxy)
#
# Ajuste:
#   - server_name para os seus domínios
#   - caminhos ssl_certificate / ssl_certificate_key (Let's Encrypt ou outro)
#   - upstream se a app não estiver em 127.0.0.1
#
# Portas locais padrão do projeto (run_local.sh):
#   - FastAPI: 8000
#   - Streamlit: 8501 (ou o valor em --server.port)
#
# Depois de colocar atrás do proxy, defina no servidor da aplicação:
#   export API_URL="https://api.SEU_DOMINIO"
#   export CORS_ORIGINS="https://app.SEU_DOMINIO"
# (ver infra/README.md)

upstream rocbyip_api {
    zone rocbyip_api 64k;
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream rocbyip_streamlit {
    zone rocbyip_ui 64k;
    server 127.0.0.1:8501;
    keepalive 32;
}

# API — subdomínio dedicado (recomendado)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 52m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://rocbyip_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# UI Streamlit — subdomínio dedicado
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 52m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://rocbyip_streamlit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSockets (Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Redirecionamento HTTP → HTTPS (certbot costuma criar um ficheiro semelhante)
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com app.example.com;
    return 301 https://$host$request_uri;
}
