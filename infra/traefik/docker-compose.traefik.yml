# Traefik v3 — TLS (Let's Encrypt) → FastAPI (8000) e Streamlit (8501) no host.
#
# Uso:
#   cd infra/traefik
#   docker compose -f docker-compose.traefik.yml up -d
#
# Antes de subir: edite traefik.yml (e-mail ACME), dynamic/rocbyip.yml (domínios),
# aponte DNS de api.* e app.* para este servidor e abra 80/443.

services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    networks:
      - edge

networks:
  edge:
    name: traefik_edge

volumes:
  traefik-certs:
